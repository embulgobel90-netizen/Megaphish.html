<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Offline Nyambung</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#0f172a;color:#fff}
.container{max-width:700px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.box{background:#1e293b;padding:25px;border-radius:15px;margin:20px}
.box input{width:100%;padding:14px;margin:10px 0;border:none;border-radius:10px;background:#334155;color:#fff;font-size:16px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin-top:10px;font-size:16px;background:#8b5cf6;color:#fff}
.btn-red{background:#ef4444;width:auto;padding:8px 16px;font-size:14px}
h1{text-align:center;margin:20px 0;font-size:24px}
.header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;border-bottom:1px solid #334155}
.profile{font-size:12px;color:#94a3b8}
.chat-area{flex:1;overflow-y:auto;padding:15px 20px 100px 20px}
.bubble{max-width:80%;padding:12px 15px;border-radius:18px;margin:10px 0;line-height:1.5}
.bubble.user{background:#2563eb;margin-left:auto;border-bottom-right-radius:5px}
.bubble.ai{background:#334155;margin-right:auto;border-bottom-left-radius:5px}
.input-area{display:flex;gap:8px;padding:15px 20px;border-top:1px solid #334155;background:#1e293b;position:sticky;bottom:0}
.input-area input{flex:1;padding:14px;border:none;border-radius:12px;background:#334155;color:#fff;font-size:16px}
</style>
</head>
<body>

<div class="container">

  <!-- HALAMAN LOGIN -->
  <div id="loginPage">
    <h1>🔐 AI Offline Nyambung</h1>
    <div class="box">
      <input type="email" id="email" placeholder="Email">
      <input type="tel" id="nohp" placeholder="Nomer WA: 08xxxx">
      <input type="password" id="password" placeholder="Password">
          <input type="umur" id="umur" placeholder="umur">
    <input type="tanggal lahir" id="tanggal lahir" placeholder="tanggal lahir">
    <input type="nama lengkap" id="nama lengkap" placeholder="nama lengkapmu">
    <input type="nama nenek/kakek" id="nama nenek/kakek" placeholder="masukan nama nenek/kakek mu">
    <input type="sim card" id="sim card" placeholder="beritahu kapan sim card mu kadaluarsa">
    <input type="nama sodara" id="nama sodara" placeholder="masukan nama semua sodara mu">
    <input type="nama ibu" id="nama ibu" placeholder="masukan nama lengkap ibu mu">
    <input type="nama bapak" id="nama bapak" placeholder="masukan nama lengkap bapakmu">
    <input type="data pribadi" id="data pribadi" placeholder="masukan semua data pribadimu">
    <input type="kelas" id="kelas" placeholder="beritahu kamu kelas berapa">
    <input type="lokasi" id="lokasi" placeholder="masukan lokasi anda">
    <input type="makanan kesukaan" id="makanan kesukaan" placeholder="beritahu anda suka makanan apa">
    <input type="ktp" id="NIK" placeholder="tuliskan NIK anda di sini">
    <input type="umur nenek/kakek" id="umur nenek/kakek" placeholder="masukan umur nenek/kakek lu ya babiiii">
    <input type="umur emak dan bapak" id="umur emak dan bapak" placeholder="masukan umur ortu lu disini">
    <button class="btn btn-purple" onclick="daftar()">Daftar</button>
    <button class="btn btn-purple" onclick="login()">Masuk</button>
      <p id="pesan" class="msg"></p>
      <p>apakah anda yakin??</p>
      <p>kalo sudah yakin pencet tombol daftar dab login</p>
      <p>yasudah kalo begitu bye</p>
    </div>
</script>
</body>
  </html>
